<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wojciech Goljanek | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; }
        
        /* Navbar musi być nad wszystkim, ale pod preloaderem */
        .navbar { 
            z-index: 10000; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            pointer-events: auto !important;
        }

        .lang-btn { 
            color: rgba(255,255,255,0.4); 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.85rem; 
            transition: 0.3s;
            padding: 5px;
        }
        .lang-btn.active, .lang-btn:hover { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        
        .nav-link { pointer-events: auto !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">WOJCIECH GOLJANEK</a>
            
            <div class="ms-auto d-flex align-items-center">
                <div class="lang-switcher me-4">
                    <a href="{{ url_for('set_lang', lang='pl') }}" class="lang-btn {% if lang == 'pl' %}active{% endif %}">PL</a>
                    <span class="text-muted mx-1">|</span>
                    <a href="{{ url_for('set_lang', lang='en') }}" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
                </div>
                <a class="nav-link text-white fw-bold" href="/about">{{ t.nav_about }}</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
